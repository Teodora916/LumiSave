version: '3.9'
services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lumisave_dev
      POSTGRES_USER: lumisave
      POSTGRES_PASSWORD: lumisave123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: